<div class="form-container">
  <!-- Header -->
  <div class="page-header">
    <div class="page-icon" style="background: linear-gradient(135deg, var(--accent-soft), var(--lavender))">📦</div>
    <div>
      <h2>Registrar Orden</h2>
      <p class="subtitle">Completa todos los campos para registrar una nueva orden</p>
    </div>
  </div>
  <div class="divider"></div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">

    <!-- Sección 1: Información de Orden -->
    <div class="form-card">
      <div class="step-badge">
        <div class="step-number" style="background: var(--accent-soft); color: var(--accent)">1</div>
        <h3>Información de Orden</h3>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="orderId">Order ID</label>
          <input id="orderId" type="text" formControlName="orderId" placeholder="Ej. CA-2024-152156" />
        </div>
        <div class="field">
          <label for="orderDate">Order Date</label>
          <input id="orderDate" type="date" formControlName="orderDate" />
        </div>
        <div class="field">
          <label for="shipDate">Ship Date</label>
          <input id="shipDate" type="date" formControlName="shipDate" />
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="shipMode">Ship Mode</label>
          <select id="shipMode" formControlName="shipMode">
            <option value="">Seleccionar...</option>
            @for (mode of shipModes; track mode) {
              <option [value]="mode">{{ mode }}</option>
            }
          </select>
        </div>
        <div class="field">
          <label for="segment">Segment</label>
          <select id="segment" formControlName="segment">
            <option value="">Seleccionar...</option>
            @for (seg of segments; track seg) {
              <option [value]="seg">{{ seg }}</option>
            }
          </select>
        </div>
      </div>
    </div>

    <!-- Sección 2: Información de Cliente -->
    <div class="form-card">
      <div class="step-badge">
        <div class="step-number" style="background: var(--lavender-soft); color: var(--lavender-txt)">2</div>
        <h3>Información de Cliente</h3>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="customerId">Customer ID</label>
          <input id="customerId" type="text" formControlName="customerId" placeholder="Ej. CG-12520" />
        </div>
        <div class="field">
          <label for="customerName">Customer Name</label>
          <input id="customerName" type="text" formControlName="customerName" placeholder="Ej. Claire Gute" />
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="countryRegion">Country/Region</label>
          <input id="countryRegion" type="text" formControlName="countryRegion" placeholder="Ej. United States" />
        </div>
        <div class="field">
          <label for="city">City</label>
          <input id="city" type="text" formControlName="city" placeholder="Ej. Henderson" />
        </div>
        <div class="field">
          <label for="stateProvince">State/Province</label>
          <input id="stateProvince" type="text" formControlName="stateProvince" placeholder="Ej. Kentucky" />
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="postalCode">Postal Code</label>
          <input id="postalCode" type="text" formControlName="postalCode" placeholder="Ej. 42420" />
        </div>
        <div class="field">
          <label for="region">Region</label>
          <select id="region" formControlName="region">
            <option value="">Seleccionar...</option>
            @for (reg of regions; track reg) {
              <option [value]="reg">{{ reg }}</option>
            }
          </select>
        </div>
      </div>
    </div>

    <!-- Sección 3: Información de Producto -->
    <div class="form-card">
      <div class="step-badge">
        <div class="step-number" style="background: var(--mint-soft); color: var(--mint-text)">3</div>
        <h3>Información de Producto</h3>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="productId">Product ID</label>
          <input id="productId" type="text" formControlName="productId" placeholder="Ej. FUR-BO-10001798" />
        </div>
        <div class="field">
          <label for="productName">Product Name</label>
          <input id="productName" type="text" formControlName="productName" placeholder="Ej. Bush Somerset Bookcase" />
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="category">Category</label>
          <select id="category" formControlName="category">
            <option value="">Seleccionar...</option>
            @for (cat of categories; track cat) {
              <option [value]="cat">{{ cat }}</option>
            }
          </select>
        </div>
        <div class="field">
          <label for="subCategory">Sub-Category</label>
          <select id="subCategory" formControlName="subCategory" [disabled]="availableSubCategories().length === 0">
            <option value="">Seleccionar categoría primero...</option>
            @for (sub of availableSubCategories(); track sub) {
              <option [value]="sub">{{ sub }}</option>
            }
          </select>
        </div>
      </div>
    </div>

    <!-- Sección 4: Métricas -->
    <div class="form-card">
      <div class="step-badge">
        <div class="step-number" style="background: var(--lemon); color: var(--lemon-text)">4</div>
        <h3>Métricas</h3>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="sales">Sales ($)</label>
          <input id="sales" type="number" formControlName="sales" min="0" step="0.01" placeholder="0.00" />
        </div>
        <div class="field">
          <label for="quantity">Quantity</label>
          <input id="quantity" type="number" formControlName="quantity" min="1" placeholder="1" />
        </div>
        <div class="field">
          <label for="discount">Discount (0-1)</label>
          <input id="discount" type="number" formControlName="discount" min="0" max="1" step="0.01" placeholder="0.00" />
        </div>
        <div class="field">
          <label for="profit">Profit ($)</label>
          <input id="profit" type="number" formControlName="profit" step="0.01" placeholder="0.00" />
        </div>
      </div>
    </div>

    <!-- Botones -->
    <div class="btn-row">
      <button type="button" class="btn-secondary" (click)="cancelar()">Cancelar</button>
      <button type="submit" class="btn-primary" [disabled]="enviando()">
        @if (enviando()) { Enviando... } @else { 💾 Registrar Orden }
      </button>
    </div>

  </form>
</div>

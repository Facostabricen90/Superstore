<div class="app-wrapper">
  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <!-- Logo -->
      <a routerLink="/" class="logo">
        <div class="logo-icon">🏪</div>
        <div>
          <span class="logo-text">Super</span><span class="logo-accent">Store</span>
        </div>
      </a>

      <!-- Navigation -->
      <nav class="nav">
        <app-nav-item to="/orders/nueva" icon="✦" label="Nueva Orden" [isPrimary]="true" />
        <app-nav-item to="/returns/nuevo" icon="↩" label="Registrar Devolución" [isPrimary]="true" />
        <div class="nav-divider"></div>
        <app-nav-item
          to="/"
          icon="📦"
          label="Órdenes"
          color="var(--mint-soft)"
          colorText="var(--mint-text)"
          [exact]="true"
        />
        <app-nav-item
          to="/people"
          icon="👥"
          label="People"
          color="var(--lavender-soft)"
          colorText="var(--lavender-txt)"
        />
        <app-nav-item
          to="/returns"
          icon="🔄"
          label="Returns"
          color="var(--rose-soft)"
          colorText="var(--rose-text)"
        />
      </nav>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main">
    <div class="content-card">
      <router-outlet />
    </div>
    <footer class="footer">SuperStore · Dashboard 📊</footer>
  </main>
</div>
